<!DOCTYPE html>
<html>
<head>
  <title>My First Website</title>
  
  <style>
    body {
      background-color: #f0f8ff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    img {
      border-radius: 50%;
      width: 200px;
      height: 200px;
      object-fit: cover;
      border: 4px solid #4f46e5;
    }

    input, textarea {
      width: 100%;
      max-width: 300px;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      display: block; /* Isse inputs ek ke neeche ek aayenge */
    }

    button {
      background-color: #4f46e5;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #3b31c1;
    }
  </style>
</head>
<body>

  <h1>Welcome To My Website</h1>
  
  <h2>About Me</h2>
  <p>My name is Ayesha.</p>
  <p>I am learning HTML in VS Code.</p>
  
  <img src="project.png.jpeg" alt="Ayesha Farooq">

  <h2>My Skills</h2>
  <ul>
    <li>HTML</li>
    <li>Learning Coding</li>
    <li>Web Development</li>
  </ul>

  <h2>My Favorite Website</h2>
  <a href="https://www.google.com" target="_blank">Open Google</a>

  <h2>Contact Me</h2>
  <form>
    <label>Your Name:</label>
    <input type="text" placeholder="Enter your name">

    <label>Your Email:</label>
    <input type="email" placeholder="Enter your email">

    <label>Message:</label>
    <textarea placeholder="Write your message here..."></textarea>

    <button type="submit">Send Message</button>
  </form>

</body>
</html>
